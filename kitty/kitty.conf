# Theme
include catppuccin-latte.conf

# Font
font_family JetBrainsMono Nerd Font
font_size 14

# Terminal
term xterm-256color
scrollback_lines 10000

# Window appearance
background_opacity 1
window_padding_width 0
hide_window_decorations no

# Cursor
cursor_shape block
cursor_blink_interval 0.5
shell_integration no-cursor

# Dim inactive panes
inactive_text_alpha 0.7

# Tab bar
tab_bar_style powerline
tab_powerline_style round
tab_title_template "{index}: {title}"

# macOS
macos_option_as_alt yes

# Splits (ctrl+shift is the default kitty_mod)
map ctrl+shift+5 launch --location=vsplit --cwd=current
map ctrl+shift+' launch --location=hsplit --cwd=current

# Navigate panes
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Resize panes
map ctrl+shift+r start_resizing_window

# Tabs
map ctrl+shift+c new_tab_with_cwd
map ctrl+shift+n next_tab
map ctrl+shift+p previous_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Copy mode
map ctrl+shift+[ show_scrollback

# Open URL
map ctrl+shift+o open_url_with_hints

# Quick select (file:line hints)
map ctrl+shift+s kitten hints --type regex --regex '[\w/.-]+\.(?:go|py|lua):\d+'

# Edit config
map cmd+, launch --type=tab nvim ~/.config/kitty/kitty.conf

# Word navigation
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
